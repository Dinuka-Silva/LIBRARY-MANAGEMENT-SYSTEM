server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/library_management
# Or if using separate properties:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=library_management

# Logging configuration
logging.level.org.springframework.data.mongodb=DEBUG


# CORS Configuration (to allow React frontend access)
cors.allowed.origins=http://localhost:5173,http://localhost:3000,http://localhost:3001

# Email Configuration (Example: Mailtrap / SMTP)
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=YOUR_USERNAME
spring.mail.password=YOUR_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
